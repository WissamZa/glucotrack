name: glucotrack
description: Bilingual Blood Glucose Tracking App — Arabic/English with three display themes and SQLite local storage.
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  shared_preferences: ^2.5.3

  # Charts
  fl_chart: ^1.2.0

  # Date/time formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0

  # File export/import for local backup
  file_picker: ^12.0.0-beta.7
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  sqflite_common_ffi_web: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon-512.png"
  adaptive_icon_background: "#0d9488"
  adaptive_icon_foreground: "assets/icons/icon-512.png"
  min_sdk_android: 21
