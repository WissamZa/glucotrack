name: glucotrack
description: Bilingual Blood Glucose Tracking App — Arabic/English with three display themes and SQLite local storage.
license: MIT
publish_to: "none"
version: 1.2.2+4

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  cupertino_icons: ^1.0.8
  file_picker: ^12.0.0-beta.7
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_blue_plus: ^2.3.9
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.13.0
  permission_handler: ^12.0.0
  pointycastle: ^4.0.0
  printing: ^5.15.0
  provider: ^6.1.2
  share_plus: ^13.2.0
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.2
  sqflite_sqlcipher: ^3.4.0
  timezone: ^0.11.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon-512.png"
  adaptive_icon_background: "#0d9488"
  adaptive_icon_foreground: "assets/icons/icon-512.png"
  min_sdk_android: 21
