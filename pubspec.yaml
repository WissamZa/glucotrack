name: glucotrack
description: Bilingual Blood Glucose Tracking App — Arabic/English with three display themes, SQLite local storage, and optional Google Drive sync.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Date/time formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # File export/import for local backup
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Optional Google Drive sync (commented out for initial release;
  # enable when ready to wire up OAuth flow on mobile)
  # google_sign_in: ^6.2.1
  # googleapis: ^13.1.0
  # googleapis_auth: ^1.6.0
  # http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

  # Localizations are auto-generated from lib/l10n/*.arb
  # (flutter gen-l10n runs automatically on build)

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon-512.png"
  adaptive_icon_background: "#0d9488"
  adaptive_icon_foreground: "assets/icons/icon-512.png"
  min_sdk_android: 21
