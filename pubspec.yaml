name: glucotrack
description: Bilingual Blood Glucose Tracking App — Arabic/English with three display themes and SQLite local storage.
license: MIT
publish_to: "none"
version: 1.2.2+4

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Unique ID generation (UUIDv4) for readings, reminders, etc.
  uuid: ^4.5.1

  # Local database (SQLCipher-encrypted at rest)
  sqflite_sqlcipher: ^2.4.4
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.0

  # Secure storage for the DB encryption key (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^1.2.0

  # Date/time formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # File export/import for local backup
  file_picker: ^8.1.4
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  pdf: ^3.11.0
  printing: ^5.13.0

  # Bluetooth Low Energy — OneTouch meter sync (Android, iOS, macOS, Windows)
  flutter_blue_plus: ^1.35.3

  # AES-128-ECB for OneTouch application-layer auth challenge-response
  pointycastle: ^3.9.1

  # Local notifications for reminders
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.0

  # Permission handling
  permission_handler: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon-512.png"
  adaptive_icon_background: "#0d9488"
  adaptive_icon_foreground: "assets/icons/icon-512.png"
  min_sdk_android: 21
