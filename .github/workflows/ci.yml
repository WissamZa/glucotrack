name: CI

on:
  push:
    branches: [main, 'remediation/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/
      - name: Analyze
        run: flutter analyze --fatal-infos

  test:
    name: Unit + Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run tests
        run: flutter test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Dependency audit
        run: flutter pub audit --no-fatal-infos
      - name: Check for hardcoded secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: License check (no GPL in MIT project)
        run: |
          if grep -r 'GPL-3.0' lib/; then
            echo 'ERROR: GPL-3.0 code found in lib/'
            exit 1
          fi
          echo 'License check passed'

  build-check:
    name: Verify Build Compiles
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [analyze, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build debug APK
        run: flutter build apk --debug --no-pub
      - name: Verify APK exists
        run: test -f build/app/outputs/flutter-apk/app-debug.apk
