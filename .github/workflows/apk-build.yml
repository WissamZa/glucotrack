name: 📱 APK Build & Release (TWA)

# ─────────────────────────────────────────────────────────────────────────────
# FIX SUMMARY (replaces the broken expect/Bubblewrap interactive approach):
#
#  PROBLEM 1 – `bubblewrap build` launches an interactive TTY wizard that the
#    `expect` script couldn't reliably drive. Runs timed out after 2+ hours or
#    died in < 1 min when expect mis-matched a prompt.
#
#  PROBLEM 2 – `--signingKeyPath / --signingKeyAlias / --signingKeyPassword /
#    --keystorePassword` are NOT valid `bubblewrap build` flags; they are
#    init-time fields written into twa-manifest.json, so signing never worked.
#
#  PROBLEM 3 – Tag trigger was `apk-v*` but release tags are `v*`, so
#    tag-triggered builds never ran and version parsing was wrong.
#
#  FIX STRATEGY – Use Bubblewrap only to scaffold the Gradle project
#    (bubblewrap init --skipPwaValidation), then invoke Gradle directly:
#      ./gradlew bundleRelease   → produces a signed AAB  (preferred)
#      ./gradlew assembleRelease → produces a signed APK  (sideload / fallback)
#    This bypasses ALL interactive prompts and is the standard approach used
#    by Google's own TWA sample CI pipelines.
#
#  PROBLEM 4 – softprops/action-gh-release `files:` would error when
#    BUILD-FAILED.txt didn't exist. Fixed with conditional artifact collection.
# ─────────────────────────────────────────────────────────────────────────────
#
# Prerequisites (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64     base64-encoded .keystore file
#   ANDROID_KEY_ALIAS           key alias, e.g. "glucotrack"
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_PASSWORD        key password
#   WEB_APP_URL                 (optional secret) override the default URL
#
# Generate a signing keystore (run once locally):
#   keytool -genkey -v -keystore release.keystore -alias glucotrack \
#     -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w 0 release.keystore   # → paste as ANDROID_KEYSTORE_BASE64 secret
#
# Trigger a release:
#   git tag v1.2.3 && git push origin v1.2.3
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      # Matches both "v1.0.0" and legacy "apk-v1.0.0" tag formats
      - "v[0-9]*"
      - "apk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.2.3)"
        required: false
        default: "1.0.0-dev"
      web_app_url:
        description: "Public URL of the deployed web app"
        required: false
        default: "https://wissamza.github.io/glucotrack/"

permissions:
  contents: write

concurrency:
  group: "apk-build-${{ github.ref }}"
  cancel-in-progress: false

env:
  # Default web URL — override with WEB_APP_URL secret or workflow_dispatch input
  DEFAULT_WEB_URL: "https://wissamza.github.io/glucotrack/"
  APP_ID: "com.wissamza.glucotrack"
  APP_NAME: "GlucoTrack"
  KEY_ALIAS_DEFAULT: "glucotrack"

jobs:
  build-apk:
    name: Build & Sign TWA APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────────
      - name: 🧰 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🧰 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🧰 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: 🔧 Install required Android SDK components
        run: |
          # Install the platform + build-tools Bubblewrap/Gradle needs
          yes | sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            2>/dev/null || true
          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed 2>&1 | grep -E "platforms|build-tools|platform-tools" || true

      # ── 3. Version & URL resolution ─────────────────────────────────────────
      - name: 🏷️ Resolve version, version-code and web URL
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
            WEB_URL="${{ github.event.inputs.web_app_url }}"
            [ -z "$WEB_URL" ] && WEB_URL="${{ secrets.WEB_APP_URL || env.DEFAULT_WEB_URL }}"
          else
            # Tag may be "v1.2.3" or "apk-v1.2.3" — strip both prefixes
            RAW_VERSION="${GITHUB_REF#refs/tags/}"
            RAW_VERSION="${RAW_VERSION#apk-v}"
            RAW_VERSION="${RAW_VERSION#v}"
            WEB_URL="${{ secrets.WEB_APP_URL || env.DEFAULT_WEB_URL }}"
          fi

          # Strip leading "v" if user typed it in the dispatch input
          CLEAN="${RAW_VERSION#v}"

          IFS='.' read -r MAJOR MINOR PATCH REST <<< "$CLEAN"
          MAJOR="${MAJOR:-1}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "version_name=${CLEAN}"         >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}"  >> "$GITHUB_OUTPUT"
          echo "web_url=${WEB_URL}"            >> "$GITHUB_OUTPUT"
          # Tag for the GitHub Release
          echo "release_tag=v${CLEAN}"         >> "$GITHUB_OUTPUT"

          echo "▶ version_name   = ${CLEAN}"
          echo "▶ version_code   = ${VERSION_CODE}"
          echo "▶ web_url        = ${WEB_URL}"

      # ── 4. Signing keystore ──────────────────────────────────────────────────
      - name: 🔐 Prepare signing keystore
        id: keystore
        env:
          KEYSTORE_B64:  ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS_IN: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS_IN:  ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS_IN:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p signing
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > signing/release.keystore
            echo "signed=true"                       >> "$GITHUB_OUTPUT"
            echo "store_pass=${STORE_PASS_IN}"       >> "$GITHUB_OUTPUT"
            echo "key_alias=${KEY_ALIAS_IN}"         >> "$GITHUB_OUTPUT"
            echo "key_pass=${KEY_PASS_IN}"           >> "$GITHUB_OUTPUT"
            echo "keystore_path=$(pwd)/signing/release.keystore" >> "$GITHUB_OUTPUT"
            echo "✅ Release keystore decoded."
          else
            echo "⚠️  ANDROID_KEYSTORE_BASE64 not set — generating a debug keystore."
            echo "    This APK is NOT suitable for the Play Store."
            keytool -genkey -v \
              -keystore signing/release.keystore \
              -alias "${{ env.KEY_ALIAS_DEFAULT }}" \
              -storepass android \
              -keypass  android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=GlucoTrack Debug, OU=CI, O=WissamZa, L=Dev, ST=Dev, C=SA"
            echo "signed=false"                                   >> "$GITHUB_OUTPUT"
            echo "store_pass=android"                             >> "$GITHUB_OUTPUT"
            echo "key_alias=${{ env.KEY_ALIAS_DEFAULT }}"        >> "$GITHUB_OUTPUT"
            echo "key_pass=android"                               >> "$GITHUB_OUTPUT"
            echo "keystore_path=$(pwd)/signing/release.keystore" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Install Bubblewrap (scaffold only — no interactive build) ─────────
      - name: 📦 Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      # ── 6. Write twa-manifest.json ───────────────────────────────────────────
      - name: 📝 Write twa-manifest.json
        run: |
          mkdir -p android-twa
          HOST=$(echo "${{ steps.meta.outputs.web_url }}" \
                 | sed -E 's|https?://||; s|/.*||')

          cat > android-twa/twa-manifest.json << EOF
          {
            "packageId":                    "${{ env.APP_ID }}",
            "host":                         "${HOST}",
            "name":                         "${{ env.APP_NAME }}",
            "launcherName":                 "${{ env.APP_NAME }}",
            "display":                      "standalone",
            "orientation":                  "default",
            "themeColor":                   "#0d9488",
            "themeColorDark":               "#0f172a",
            "navigationColor":              "#0d9488",
            "navigationColorDark":          "#0f172a",
            "navigationDividerColor":       "#0d9488",
            "navigationDividerColorDark":   "#0f172a",
            "backgroundColor":              "#ffffff",
            "enableNotifications":          false,
            "startUrl":                     "/",
            "iconUrl":                      "https://raw.githubusercontent.com/WissamZa/glucotrack/main/public/icon-512.png",
            "maskableIconUrl":              "https://raw.githubusercontent.com/WissamZa/glucotrack/main/public/icon-512.png",
            "splashScreenFadeOutDuration":  300,
            "signingKey": {
              "path":  "${{ steps.keystore.outputs.keystore_path }}",
              "alias": "${{ steps.keystore.outputs.key_alias }}"
            },
            "appVersionName":  "${{ steps.meta.outputs.version_name }}",
            "appVersionCode":  ${{ steps.meta.outputs.version_code }},
            "generatorService":"github-actions",
            "webManifestUrl":  "${{ steps.meta.outputs.web_url }}manifest.webmanifest",
            "fingerprints":    []
          }
          EOF

          echo "=== twa-manifest.json ==="
          cat android-twa/twa-manifest.json

      # ── 7. Scaffold Gradle project (non-interactive) ─────────────────────────
      - name: 🏗️ Init Bubblewrap Gradle project (non-interactive)
        run: |
          cd android-twa

          # bubblewrap init reads twa-manifest.json from CWD when no --manifest flag.
          # We set BUBBLEWRAP_SKIP_UPDATE=1 and pass Java + SDK paths via env so
          # it never prompts for them.
          export BUBBLEWRAP_DISABLE_TELEMETRY=1
          export JAVA_HOME="$JAVA_HOME"
          export ANDROID_HOME="$ANDROID_HOME"

          # --skipPwaValidation skips the network fetch of the PWA manifest/icon
          # which would fail if GitHub Pages isn't deployed yet.
          bubblewrap init \
            --manifest=./twa-manifest.json \
            --directory=. \
            --skipPwaValidation \
            2>&1 || {
              echo "⚠️  bubblewrap init exited non-zero (may be a prompt it printed)."
              echo "    Continuing — Gradle project should still have been written."
            }

          echo "=== Gradle project files ==="
          ls -la

      # ── 8. Patch build.gradle with correct version ───────────────────────────
      - name: 🔧 Patch versionCode / versionName in build.gradle
        run: |
          BUILD_GRADLE="android-twa/app/build.gradle"
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "⚠️  $BUILD_GRADLE not found — Bubblewrap scaffold may have failed."
            ls -la android-twa/ || true
            exit 1
          fi

          sed -i \
            "s/versionCode .*/versionCode ${{ steps.meta.outputs.version_code }}/" \
            "$BUILD_GRADLE"
          sed -i \
            "s/versionName .*/versionName \"${{ steps.meta.outputs.version_name }}\"/" \
            "$BUILD_GRADLE"

          echo "=== Patched defaultConfig block ==="
          grep -A 10 "defaultConfig" "$BUILD_GRADLE"

      # ── 9. Build with Gradle directly (no TTY, no prompts) ──────────────────
      - name: 🔨 Build signed APK with Gradle
        env:
          STORE_PASS:     ${{ steps.keystore.outputs.store_pass }}
          KEY_PASS:       ${{ steps.keystore.outputs.key_pass }}
          KEY_ALIAS:      ${{ steps.keystore.outputs.key_alias }}
          KEYSTORE_PATH:  ${{ steps.keystore.outputs.keystore_path }}
        run: |
          cd android-twa

          # Give Gradle the signing config via project properties
          # (Bubblewrap's generated build.gradle already has a release signingConfig
          #  block that reads these exact property names)
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            2>&1 | tee /tmp/gradle-build.log

          echo "=== APK search ==="
          find . -name "*.apk" -type f | sort

      # ── 10. Collect artifacts ────────────────────────────────────────────────
      - name: 📦 Collect APK
        id: collect
        run: |
          mkdir -p artifact
          VERSION="${{ steps.meta.outputs.version_name }}"
          APK_NAME="GlucoTrack-v${VERSION}.apk"

          # Prefer the release APK; fall back to any APK found
          RELEASE_APK=$(find android-twa -name "app-release.apk" -type f 2>/dev/null | head -1)
          ANY_APK=$(find android-twa -name "*.apk" -type f 2>/dev/null | head -1)

          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "artifact/$APK_NAME"
            echo "apk_found=true"  >> "$GITHUB_OUTPUT"
            echo "apk_path=artifact/$APK_NAME" >> "$GITHUB_OUTPUT"
            echo "✅ APK collected: $APK_NAME"
          elif [ -n "$ANY_APK" ]; then
            cp "$ANY_APK" "artifact/$APK_NAME"
            echo "apk_found=true"  >> "$GITHUB_OUTPUT"
            echo "apk_path=artifact/$APK_NAME" >> "$GITHUB_OUTPUT"
            echo "✅ APK collected (fallback): $APK_NAME"
          else
            echo "❌ No APK produced. See workflow logs for details." \
              > artifact/BUILD-FAILED.txt
            echo "Build log tail:" >> artifact/BUILD-FAILED.txt
            tail -50 /tmp/gradle-build.log >> artifact/BUILD-FAILED.txt 2>/dev/null || true
            echo "apk_found=false" >> "$GITHUB_OUTPUT"
            echo "apk_path=artifact/BUILD-FAILED.txt" >> "$GITHUB_OUTPUT"
            echo "❌ No APK produced — placeholder file created."
          fi

          ls -lh artifact/

      # ── 11. Upload to Actions artifacts ─────────────────────────────────────
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glucotrack-apk-v${{ steps.meta.outputs.version_name }}
          path: artifact/
          retention-days: 90

      # ── 12. GitHub Release ───────────────────────────────────────────────────
      - name: 📝 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: "📱 APK Release ${{ steps.meta.outputs.release_tag }}"
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version_name, 'dev') || contains(steps.meta.outputs.version_name, 'rc') }}
          files: ${{ steps.collect.outputs.apk_path }}
          body: |
            # GlucoTrack Android APK ${{ steps.meta.outputs.release_tag }}

            ## 📦 Artifact
            - `GlucoTrack-${{ steps.meta.outputs.release_tag }}.apk` — ${{ steps.keystore.outputs.signed == 'true' && 'Release-signed' || 'Debug-signed (no keystore secret set)' }} Android APK (TWA)

            ## 📲 Installation
            1. Download the APK on your Android phone
            2. Enable **Install from unknown sources** in Settings → Security
            3. Open the APK file to install

            ## ℹ️ Notes
            - Built as a **Trusted Web Activity (TWA)** wrapping: ${{ steps.meta.outputs.web_url }}
            - The web app must be publicly accessible for the APK to display content
            - To remove the URL bar, add `assetlinks.json` to your web app's `/.well-known/` path
            - For Play Store distribution, set the four keystore secrets in repo Settings

            ## 🔑 Signing
            ${{ steps.keystore.outputs.signed == 'true' && '✅ Signed with the production keystore (ANDROID_KEYSTORE_BASE64 secret)' || '⚠️ Signed with a temporary debug keystore — not suitable for Play Store' }}
