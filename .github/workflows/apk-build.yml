name: 📱 APK Build & Release (Flutter)

# Builds a signed Android APK from the Flutter project.
#
# Trigger:
#   - Push tag apk-v* → builds + creates Release
#   - Manual dispatch (workflow_dispatch) → same
#
# Signing:
#   - If ANDROID_KEYSTORE_BASE64 secret is set, signs with production keystore
#   - Otherwise, signs with debug keystore (for testing only)

on:
  push:
    tags:
      - "apk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0-dev"

permissions:
  contents: write

concurrency:
  group: "apk-build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: 🏷️ Determine version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/apk-v}"
            VERSION="v${VERSION#v}"
          fi
          CLEAN="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
          : "${MAJOR:=1}"; : "${MINOR:=0}"; : "${PATCH:=0}"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$CLEAN" >> $GITHUB_OUTPUT
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "Building GlucoTrack $VERSION (code: $CODE)"

      - name: 🔐 Setup signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android

          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️  ANDROID_KEYSTORE_BASE64 not set. Generating debug keystore."
            keytool -genkey -v \
              -keystore release.keystore \
              -alias glucotrack \
              -storepass android \
              -keypass android \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -dname "CN=GlucoTrack, OU=Dev, O=WissamZa, L=Dev, ST=Dev, C=SA"
            echo "store_password=android" > key.properties
            echo "key_password=android" >> key.properties
            echo "key_alias=glucotrack" >> key.properties
            echo "store_file=release.keystore" >> key.properties
            echo "signed=false" >> $GITHUB_OUTPUT
          else
            echo "🔑 Using production keystore from secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "store_password=$KEYSTORE_PASS" > key.properties
            echo "key_password=$KEY_PASS" >> key.properties
            echo "key_alias=$KEY_ALIAS" >> key.properties
            echo "store_file=release.keystore" >> key.properties
            echo "signed=true" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Build APK
        run: |
          sed -i "s/^version: .*/version: ${{ steps.meta.outputs.version_name }}+${{ steps.meta.outputs.version_code }}/" pubspec.yaml
          flutter build apk --release --build-name=${{ steps.meta.outputs.version_name }} --build-number=${{ steps.meta.outputs.version_code }}

      - name: 📦 Rename APK
        run: |
          mkdir -p artifact
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifact/GlucoTrack-${{ steps.meta.outputs.version }}.apk
          ls -la artifact/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glucotrack-apk
          path: artifact/*.apk
          retention-days: 90

      - name: 📝 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: "📱 APK Release ${{ steps.meta.outputs.version }}"
          body: |
            # GlucoTrack Android APK ${{ steps.meta.outputs.version }}

            Built with **Flutter 3.22** — native Android build.

            ## 📦 Artifact
            - `GlucoTrack-${{ steps.meta.outputs.version }}.apk` — Signed Android APK

            ## 📲 Installation
            1. Download the APK on your Android phone
            2. Allow "Install from unknown sources" in Settings
            3. Open the APK file to install

            ## ✨ Features
            - 📝 Log readings (value, type, time, notes, carbs, insulin)
            - ✏️ Edit & delete readings
            - 📊 Interactive charts (area / line / bar)
            - 🔀 Sort by newest / oldest / highest / lowest
            - 🔔 Reminders for scheduled measurements
            - 🌐 Bilingual UI (Arabic RTL / English LTR)
            - 🎨 3 themes (Classic / Modern / Elder)
            - 💾 Local SQLite storage (offline-first)

            ## 🔐 Signing
            ${{ steps.signing.outputs.signed == 'true' && '✅ Production-signed' || '⚠️ Debug-signed (testing only)' }}
          files: |
            artifact/GlucoTrack-${{ steps.meta.outputs.version }}.apk
          draft: false
          prerelease: false
