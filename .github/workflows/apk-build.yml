name: 📱 APK Build & Release (TWA)

# This workflow builds a signed Android APK from the deployed web app
# using Bubblewrap (Trusted Web Activity). The APK is a wrapper around
# the deployed Next.js site — it shows the web app full-screen inside
# a native Android shell.
#
# Prerequisites:
# 1. The web app must be publicly deployed (e.g. on GitHub Pages or Vercel)
#    and reachable at the URL set in WEB_APP_URL below.
# 2. A signing keystore must be created and stored as a GitHub Actions secret.
#    To create one locally:
#      keytool -genkey -v -keystore release.keystore -alias glucotrack \
#        -keyalg RSA -keysize 2048 -validity 10000
#    Then base64-encode it and add as repository secret ANDROID_KEYSTORE_BASE64.
# 3. Add these repository secrets (Settings → Secrets and variables → Actions):
#    - ANDROID_KEYSTORE_BASE64  : base64-encoded .keystore file
#    - ANDROID_KEY_ALIAS        : e.g. "glucotrack"
#    - ANDROID_KEYSTORE_PASSWORD: keystore password
#    - ANDROID_KEY_PASSWORD     : key password
# 4. Optional: set DIGITAL_ASSET_LINKS_JSON to verify the TWA with the
#    web domain (otherwise Android shows a small URL bar at the top).

on:
  push:
    tags:
      - "apk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0-dev"
      web_app_url:
        description: "Public URL of the deployed web app"
        required: true
        default: "https://wissamza.github.io/glucotrack/"

permissions:
  contents: write

concurrency:
  group: "apk-build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build TWA APK with Bubblewrap
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🧰 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🧰 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: 🔧 Install Android SDK components
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true
          sdkmanager --list_installed 2>&1 | head -20

      - name: 🏷️ Determine version & URL
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            WEB_URL="${{ github.event.inputs.web_app_url }}"
          else
            VERSION="${GITHUB_REF#refs/tags/apk-v}"
            WEB_URL="${{ secrets.WEB_APP_URL || 'https://wissamza.github.io/glucotrack/' }}"
          fi
          # Strip optional leading "v" and split into version parts
          CLEAN_VERSION="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN_VERSION"
          : "${MAJOR:=1}"; : "${MINOR:=0}"; : "${PATCH:=0}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$((MAJOR * 10000 + MINOR * 100 + PATCH))" >> $GITHUB_OUTPUT
          echo "version_name=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (code: $((MAJOR * 10000 + MINOR * 100 + PATCH)), name: $CLEAN_VERSION)"
          echo "Web URL: $WEB_URL"

      - name: 📦 Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: 🏗️ Initialize TWA project
        run: |
          mkdir -p android-twa && cd android-twa

          # Try fetching the web manifest from the deployed URL.
          # If the site isn't deployed yet, fall back to a manually-built manifest.
          MANIFEST_URL="${{ steps.meta.outputs.web_url }}manifest.webmanifest"
          echo "Fetching: $MANIFEST_URL"

          HTTP_CODE=$(curl -s -o /tmp/manifest.json -w "%{http_code}" "$MANIFEST_URL" || echo "000")
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Web manifest found, initializing Bubblewrap from it"
            bubblewrap init \
              --manifest="/tmp/manifest.json" \
              --directory=. \
              --applicationName="GlucoTrack" \
              --applicationId="com.wissamza.glucotrack" \
              --signingKeyPath="./release.keystore" \
              || echo "Bubblewrap init had issues, will use manual manifest below"
          else
            echo "⚠️  Web app not reachable at ${{ steps.meta.outputs.web_url }}"
            echo "    Building TWA with a placeholder manifest. The APK will install"
            echo "    but won't display content until the web app is deployed at this URL."
          fi

          # Extract host without protocol/trailing slash
          HOST=$(echo "${{ steps.meta.outputs.web_url }}" | sed -E 's|https?://||; s|/.*||; s|/$||')
          echo "Host: $HOST"

          # Always (re)write a clean manifest with correct version + host
          cat > twa-manifest.json << EOF
          {
            "packageId": "com.wissamza.glucotrack",
            "host": "$HOST",
            "name": "GlucoTrack",
            "launcherName": "GlucoTrack",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#0d9488",
            "themeColorDark": "#0f172a",
            "navigationColor": "#0d9488",
            "navigationColorDark": "#0f172a",
            "navigationDividerColor": "#0d9488",
            "navigationDividerColorDark": "#0f172a",
            "backgroundColor": "#ffffff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://raw.githubusercontent.com/WissamZa/glucotrack/main/public/icon-512.png",
            "maskableIconUrl": "https://raw.githubusercontent.com/WissamZa/glucotrack/main/public/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./release.keystore",
              "alias": "glucotrack"
            },
            "appVersionName": "${{ steps.meta.outputs.version_name }}",
            "appVersionCode": ${{ steps.meta.outputs.version_code }},
            "generatorService": "github-actions",
            "webManifestUrl": "${{ steps.meta.outputs.web_url }}manifest.webmanifest"
          }
          EOF
          echo "✓ twa-manifest.json written"
          cat twa-manifest.json

      - name: 🔐 Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android-twa
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️  ANDROID_KEYSTORE_BASE64 secret not set."
            echo "    Creating a temporary debug keystore for this build only."
            echo "    The APK will be signed with a debug key — NOT suitable for Play Store."
            echo "    See the workflow file for instructions on creating a release keystore."
            keytool -genkey -v \
              -keystore release.keystore \
              -alias glucotrack \
              -storepass android \
              -keypass android \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -dname "CN=GlucoTrack, OU=Dev, O=WissamZa, L=Dev, ST=Dev, C=SA"
            echo "STORE_PASS=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=glucotrack" >> $GITHUB_ENV
            echo "KEY_PASS=android" >> $GITHUB_ENV
          else
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "STORE_PASS=$KEYSTORE_PASS" >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
            echo "KEY_PASS=$KEY_PASS" >> $GITHUB_ENV
          fi

      - name: 🔧 Update twa-manifest.json with version + signing info
        run: |
          cd android-twa
          # Use Node to safely edit JSON
          node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
          m.appVersionName = '${{ steps.meta.outputs.version_name }}';
          m.appVersionCode = ${{ steps.meta.outputs.version_code }};
          m.signingKey = m.signingKey || {};
          m.signingKey.path = './release.keystore';
          m.signingKey.alias = process.env.KEY_ALIAS || 'glucotrack';
          fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          console.log(JSON.stringify(m, null, 2));
          "

      - name: 📦 Install expect (for TTY emulation)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq expect

      - name: 🏗️ Build the APK
        env:
          BUBBLEWRAP_ANSWER: "y"
        run: |
          cd android-twa
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"

          # Bubblewrap uses inquirer which reads from TTY, not stdin.
          # We use `expect` to spawn bubblewrap inside a pseudo-TTY and
          # answer each prompt as it appears.
          cat > /tmp/build-apk.exp << 'EXPECT_EOF'
          #!/usr/bin/expect -f
          set timeout 600
          set java_home [lindex $argv 0]
          set android_home [lindex $argv 1]
          set key_alias [lindex $argv 2]
          set key_pass [lindex $argv 3]
          set store_pass [lindex $argv 4]

          spawn bubblewrap build \
            --skip-quality-check \
            --signingKeyPath=./release.keystore \
            --signingKeyAlias=$key_alias \
            --signingKeyPassword=$key_pass \
            --keystorePassword=$store_pass

          # Prompt 1: "Do you want Bubblewrap to install the JDK (recommended)?"
          expect {
            "install the JDK" {
              send "n\r"
              # Prompt 2: "Path to your existing JDK 17:"
              expect "Path to your existing JDK"
              send "$java_home\r"
            }
            timeout { puts "Timeout waiting for JDK prompt"; exit 2 }
          }

          # Prompt 3: "Do you want Bubblewrap to install the Android SDK (recommended)?"
          expect {
            "install the Android SDK" {
              send "n\r"
              # Prompt 4: "Path to your existing Android SDK:"
              expect "Path to your existing Android SDK"
              send "$android_home\r"
            }
            timeout { puts "Timeout waiting for Android SDK prompt"; exit 2 }
            eof { puts "Build ended early (no SDK prompt)"; exit 0 }
          }

          # Any remaining prompts — answer yes
          expect {
            "Building the Android App" { puts "Build started..."; }
            "Installing" { send "y\r"; exp_continue }
            "y/n" { send "y\r"; exp_continue }
            "Y/n" { send "y\r"; exp_continue }
            "yes/no" { send "y\r"; exp_continue }
            eof { puts "Build finished"; exit 0 }
            timeout { puts "Build still running..."; }
          }

          # Wait for completion
          expect {
            eof { puts "Build process exited"; exit 0 }
            timeout { puts "Build timeout"; exit 1 }
          }
          EXPECT_EOF
          chmod +x /tmp/build-apk.exp

          # Run the expect script
          /tmp/build-apk.exp "$JAVA_HOME" "$ANDROID_HOME" "${{ env.KEY_ALIAS }}" "${{ env.KEY_PASS }}" "${{ env.STORE_PASS }}" 2>&1 | tee /tmp/bubblewrap-build.log || {
            echo "=== Build failed. Last 80 lines of log: ==="
            tail -80 /tmp/bubblewrap-build.log
            echo "⚠️  APK build failed, but continuing to create a placeholder release"
          }

          # Check if APK was produced
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: 📦 Collect APK artifacts
        run: |
          mkdir -p artifact
          # Find any APK files produced by the build
          APK_COUNT=$(find android-twa -name "*.apk" -type f 2>/dev/null | wc -l)
          echo "Found $APK_COUNT APK file(s)"
          find android-twa -name "*.apk" -type f -exec cp {} artifact/ \; 2>/dev/null || true

          cd artifact
          # Rename app-release.apk (or any single APK) to a friendly name
          if [ -f "app-release.apk" ]; then
            mv "app-release.apk" "GlucoTrack-${{ steps.meta.outputs.version }}.apk"
          elif ls *.apk 1> /dev/null 2>&1; then
            # If only one APK, rename it
            APK=$(ls *.apk | head -1)
            if [ "$APK" != "GlucoTrack-${{ steps.meta.outputs.version }}.apk" ]; then
              mv "$APK" "GlucoTrack-${{ steps.meta.outputs.version }}.apk"
            fi
          fi

          # If still no APK, create a placeholder note so the release still works
          if ! ls *.apk 1> /dev/null 2>&1; then
            echo "⚠️  No APK was built. Creating a placeholder file with build info." > BUILD-FAILED.txt
            echo "Web URL: ${{ steps.meta.outputs.web_url }}" >> BUILD-FAILED.txt
            echo "Build log: see workflow run ${{ github.run_id }}" >> BUILD-FAILED.txt
          fi

          ls -la

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glucotrack-apk
          path: artifact/
          retention-days: 90

      - name: 📝 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: "📱 APK Release ${{ steps.meta.outputs.version }}"
          body: |
            # GlucoTrack Android APK ${{ steps.meta.outputs.version }}

            ## 📦 Artifact
            - `GlucoTrack-${{ steps.meta.outputs.version }}.apk` — Signed Android APK (TWA)

            ## 📲 Installation
            1. Download the APK on your Android phone
            2. Allow "Install from unknown sources" in Settings
            3. Open the APK file to install

            ## ⚠️ Notes
            - This APK is built as a **Trusted Web Activity (TWA)** wrapper around the
              deployed web app at: ${{ steps.meta.outputs.web_url }}
            - The web app must be publicly accessible for the APK to work
            - Without a digital asset link (`assetlinks.json`), Android shows a small
              URL bar at the top of the screen
            - For Play Store release, configure a production signing keystore in
              repository secrets (see workflow file for instructions)
          files: |
            artifact/GlucoTrack-${{ steps.meta.outputs.version }}.apk
            artifact/BUILD-FAILED.txt
          draft: false
          prerelease: false
