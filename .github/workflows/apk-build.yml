name: Release

on:
  push:
    tags: ["v*", "apk-v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build + Sign + Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Determine version
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#apk-v}"
          VERSION="v${VERSION#v}"
          CLEAN="${VERSION#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
          PATCH_CLEAN=$(echo "$PATCH" | tr -dc '0-9')
          : "${PATCH_CLEAN:=0}"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH_CLEAN))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$CLEAN" >> $GITHUB_OUTPUT
          echo "version_code=$CODE" >> $GITHUB_OUTPUT

      - name: Setup signing keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: Tag push requires ANDROID_KEYSTORE_BASE64 secret"
            echo "Set it in Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          cat > key.properties << EOF
          store_password=$KEYSTORE_PASS
          key_password=$KEY_PASS
          key_alias=$KEY_ALIAS
          store_file=release.keystore
          EOF
          echo "signed=true" >> $GITHUB_OUTPUT

      - name: Build release APKs with R8
        run: |
          sed -i "s|^version: .*|version: ${{ steps.meta.outputs.version_name }}+${{ steps.meta.outputs.version_code }}|" pubspec.yaml

          # 1. Build fat APK (contains all architectures)
          flutter build apk --release \
            --build-name=${{ steps.meta.outputs.version_name }} \
            --build-number=${{ steps.meta.outputs.version_code }}

          # 2. Build split APKs (reduced size per architecture)
          flutter build apk --release \
            --split-per-abi \
            --build-name=${{ steps.meta.outputs.version_name }} \
            --build-number=${{ steps.meta.outputs.version_code }}

      - name: Generate SHA256 checksums
        run: |
          cd build/app/outputs/flutter-apk
          for apk in *.apk; do
            sha256sum "$apk" > "$apk.sha256"
          done

      - name: Rename and organize APKs
        run: |
          mkdir -p artifact
          for apk in build/app/outputs/flutter-apk/*.apk; do
            filename=$(basename "$apk")
            if [ "$filename" == "app-release.apk" ]; then
              abi="universal"
            else
              abi=$(echo "$filename" | sed 's/app-\(.*\)-release.apk/\1/')
            fi
            cp "$apk" "artifact/GlucoTrack-${{ steps.meta.outputs.version }}-$abi.apk"
            cp "$apk.sha256" "artifact/GlucoTrack-${{ steps.meta.outputs.version }}-$abi.apk.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: glucotrack-release
          path: artifact/*
          retention-days: 365

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: GlucoTrack ${{ steps.meta.outputs.version }}
          body: |
            ## GlucoTrack ${{ steps.meta.outputs.version }}

            **Signing:** Production-signed
            **Build:** Optimized split-APK build for reduced size.

            ### Install
            1. Download the APK matching your device architecture:
               - `arm64-v8a`: Most modern Android devices (64-bit)
               - `armeabi-v7a`: Older Android devices (32-bit)
               - `x86_64`: Android Emulators / some ChromeOS devices
            2. Verify: `sha256sum -c <apk_file>.sha256`
            3. Allow install from unknown sources
            4. Open the APK
          files: artifact/*
          draft: false
          prerelease: false

      - name: Clean up keystore
        if: always()
        run: rm -f android/release.keystore android/key.properties
